version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: agro_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_contraseña_postgres
      POSTGRES_DB: finca_lodana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: agro_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agro.comb
      PGADMIN_DEFAULT_PASSWORD: adminpassword123
    ports:
      - "5050:80"
    depends_on:
      - postgres-db

volumes:
  postgres_data: